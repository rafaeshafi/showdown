name: Alias showdown.vercel.app

on:
  push:
    branches: [main]

jobs:
  alias:
    runs-on: ubuntu-latest
    steps:
      - name: Wait for Vercel deployment to be READY
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          for i in $(seq 1 20); do
            STATE=$(curl -sf \
              "https://api.vercel.com/v6/deployments?projectId=prj_OddbXeQUVyQneRMYkcw62rhq46M2&limit=1&target=production" \
              -H "Authorization: Bearer $VERCEL_TOKEN" \
              | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['deployments'][0]['readyState'])" 2>/dev/null)
            echo "Attempt $i: state=$STATE"
            [ "$STATE" = "READY" ] && break
            sleep 15
          done
          [ "$STATE" = "READY" ] || { echo "Timed out waiting for deployment"; exit 1; }

      - name: Point showdown.vercel.app to latest deployment
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          DEPLOY_UID=$(curl -sf \
            "https://api.vercel.com/v6/deployments?projectId=prj_OddbXeQUVyQneRMYkcw62rhq46M2&limit=1&target=production" \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['deployments'][0]['uid'])")

          echo "Aliasing $DEPLOY_UID → showdown.vercel.app"

          curl -sf -X POST \
            "https://api.vercel.com/v2/aliases" \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"alias\":\"showdown.vercel.app\",\"deploymentId\":\"$DEPLOY_UID\"}"

          echo "✅ showdown.vercel.app updated"
