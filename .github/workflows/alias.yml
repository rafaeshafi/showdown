name: Alias showdown.vercel.app

on:
  push:
    branches: [main]

jobs:
  alias:
    runs-on: ubuntu-latest
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      PROJECT_ID: prj_OddbXeQUVyQneRMYkcw62rhq46M2
      ALIAS: showdown.vercel.app
      COMMIT_SHA: ${{ github.sha }}

    steps:
      - name: Wait for deployment and update alias
        run: |
          python3 << 'PYEOF'
          import os, time, urllib.request, urllib.error, json

          token = os.environ["VERCEL_TOKEN"]
          project_id = os.environ["PROJECT_ID"]
          alias = os.environ["ALIAS"]
          commit_sha = os.environ["COMMIT_SHA"]

          headers = {"Authorization": f"Bearer {token}", "Content-Type": "application/json"}

          def api(path, method="GET", body=None):
              url = f"https://api.vercel.com{path}"
              req = urllib.request.Request(url, headers=headers, method=method)
              if body:
                  req.data = json.dumps(body).encode()
              with urllib.request.urlopen(req) as r:
                  return json.loads(r.read())

          print(f"Waiting for deployment of commit {commit_sha[:8]}...")
          time.sleep(20)

          deploy_uid = None
          for attempt in range(24):
              data = api(f"/v6/deployments?projectId={project_id}&limit=10")
              for d in data.get("deployments", []):
                  sha = d.get("meta", {}).get("githubCommitSha", "")
                  if sha.startswith(commit_sha[:12]) or sha == commit_sha:
                      state = d["readyState"]
                      uid = d["uid"]
                      print(f"Attempt {attempt+1}: state={state} uid={uid}")
                      if state == "READY":
                          deploy_uid = uid
                          break
                      elif state == "ERROR":
                          raise SystemExit("Deployment failed with ERROR state")
                      break
              if deploy_uid:
                  break
              time.sleep(15)

          if not deploy_uid:
              print("Commit not found in 24 attempts — falling back to latest READY")
              data = api(f"/v6/deployments?projectId={project_id}&limit=1&target=production")
              deploy_uid = data["deployments"][0]["uid"]

          print(f"Aliasing {deploy_uid} → {alias}")
          result = api("/v2/aliases", method="POST", body={"alias": alias, "deploymentId": deploy_uid})
          print(f"Done: {result.get('alias', result)}")
          PYEOF
